name: young-socios-api
region: nyc
services:
  - name: api
    environment_slug: node-js
    github:
      repo: younguniversitario-wq/young-universitario-socios
      branch: main
      deploy_on_push: true
    source_dir: backend
    build_command: npm run build
    run_command: npm run start
    http_port: 8080
    health_check:
      http_path: /api/v1/health
    envs:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGIN
        value: https://younguniversitario-wq.github.io
      - key: FORM_KEY
        value: young-2026-socios-9f3k
        type: SECRET
      - key: GOOGLE_SHEETS_SPREADSHEET_ID
        value: REPLACE_ME
        type: SECRET
      - key: GOOGLE_SHEETS_SHEET_NAME
        value: socios
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        value: REPLACE_ME
        type: SECRET
      - key: GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY
        value: REPLACE_ME
        type: SECRET
      - key: RESEND_API_KEY
        value: REPLACE_ME
        type: SECRET
      - key: SMTP_HOST
        value: REPLACE_ME
        type: SECRET
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: REPLACE_ME
        type: SECRET
      - key: SMTP_PASS
        value: REPLACE_ME
        type: SECRET
      - key: MAIL_FROM
        value: REPLACE_ME
        type: SECRET
      - key: ADMIN_NOTIFICATION_EMAIL
        value: REPLACE_ME
        type: SECRET
